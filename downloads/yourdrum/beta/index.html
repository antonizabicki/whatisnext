<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOURDRUM™ - Beta Downloads</title>
  <meta name="description" content="Download YOURDRUM™ beta builds for Windows and macOS." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2214%22%20fill%3D%22%23050505%22/%3E%3Cpath%20d%3D%22M10%2018h18c9%200%209%2012%200%2012H18v16h-8V18Z%22%20fill%3D%22%23f7f7f2%22/%3E%3Cpath%20d%3D%22M36%2018h8v28h-8z%22%20fill%3D%22%23f7f7f2%22/%3E%3Cpath%20d%3D%22M49%2015l2.8%2010.2L62%2028l-10.2%202.8L49%2041l-2.8-10.2L36%2028l10.2-2.8L49%2015Z%22%20fill%3D%22%23ff7b17%22/%3E%3C/svg%3E" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    :root {
      --bg: #040404;
      --panel: rgba(255,255,255,.035);
      --panel-strong: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.18);
      --line-strong: rgba(255,255,255,.78);
      --text: #f7f7f2;
      --muted: rgba(247,247,242,.68);
      --dim: rgba(247,247,242,.42);
      --orange: #ff7b17;
      --orange-soft: rgba(255,123,23,.12);
      --danger: #ff5c5c;
      --side: clamp(16px, 4vw, 52px);
      --max: 1180px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,123,23,.14), transparent 25%),
        radial-gradient(circle at 88% 18%, rgba(255,123,23,.09), transparent 27%),
        linear-gradient(180deg, #030303 0%, #090909 48%, #030303 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 90%);
    }

    ::selection { background: var(--orange); color: #050505; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .container {
      width: min(calc(100% - var(--side) * 2), var(--max));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 18px 0 10px;
      background: linear-gradient(180deg, rgba(4,4,4,.94), rgba(4,4,4,.72), transparent);
      backdrop-filter: blur(14px);
    }

    .nav-inner {
      min-height: 68px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 12px 14px;
      border: 2px solid var(--line-strong);
      border-radius: 24px;
      background: rgba(7,7,7,.72);
      box-shadow: 0 18px 48px rgba(0,0,0,.26);
    }

    .brand {
      display: grid;
      line-height: 1;
    }

    .brand strong {
      font-family: Syne, Inter, sans-serif;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: -.08em;
      text-transform: uppercase;
    }

    .brand span,
    .tag,
    .small,
    .btn,
    .filter-btn,
    .version-meta,
    .file-path,
    .footer,
    .error-box,
    .empty-state {
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: .035em;
    }

    .brand span {
      margin-top: 4px;
      color: var(--orange);
      font-size: 11px;
    }

    .nav-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tag {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .tag.orange {
      color: var(--orange);
      background: var(--orange-soft);
      border-color: rgba(255,123,23,.36);
    }

    main { padding: 40px 0 70px; }

    .page-head {
      display: grid;
      gap: 18px;
      margin: 34px 0 28px;
      text-align: center;
    }

    h1,
    h2,
    h3 {
      font-family: Syne, Inter, sans-serif;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(46px, 8vw, 108px);
      line-height: .84;
      letter-spacing: -.095em;
    }

    .accent { color: var(--orange); }

    .page-head p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(15px, 1.45vw, 18px);
      line-height: 1.58;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.028);
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 14px;
      color: var(--muted);
      background: rgba(255,255,255,.025);
      font-size: 11px;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }

    .filter-btn.active,
    .filter-btn:hover {
      color: #050505;
      background: var(--orange);
      border-color: var(--orange);
    }

    .search {
      min-height: 42px;
      width: min(320px, 100%);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(0,0,0,.32);
      outline: none;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .search:focus { border-color: rgba(255,123,23,.78); }

    .downloads {
      display: grid;
      gap: 14px;
    }

    .version-card {
      border: 2px solid var(--line-strong);
      border-radius: 26px;
      background:
        radial-gradient(circle at 95% 0%, rgba(255,123,23,.09), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,.045), rgba(255,255,255,.018));
      box-shadow: 0 22px 58px rgba(0,0,0,.32);
      overflow: hidden;
    }

    .version-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .version-title {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .platform-badge {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      color: var(--orange);
      background: rgba(255,255,255,.04);
      font-family: Syne, Inter, sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.06em;
    }

    .version-title h2 {
      font-size: clamp(28px, 3.1vw, 46px);
      line-height: .9;
      letter-spacing: -.08em;
    }

    .version-meta {
      margin-top: 7px;
      color: var(--dim);
      font-size: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .version-actions {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 16px;
      border: 2px solid var(--line-strong);
      color: #050505;
      background: var(--text);
      box-shadow: 0 14px 34px rgba(255,255,255,.08);
      font-size: 11px;
      transition: transform .16s ease, background .16s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--orange);
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,.035);
      border-color: var(--line);
      box-shadow: none;
    }

    .btn.secondary:hover {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .version-body {
      display: grid;
      grid-template-columns: 1fr minmax(260px, .52fr);
      gap: 18px;
      padding: 18px;
    }

    .changes {
      display: grid;
      gap: 10px;
      list-style: none;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .changes li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
    }

    .changes li::before {
      content: "•";
      color: var(--orange);
      font-size: 20px;
      line-height: 1;
    }

    .file-box {
      display: grid;
      gap: 10px;
      align-content: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(0,0,0,.24);
      min-width: 0;
    }

    .small {
      color: var(--dim);
      font-size: 10px;
    }

    .file-path {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      text-transform: none;
    }

    .error-box,
    .empty-state {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,92,92,.38);
      background: rgba(255,92,92,.08);
      color: rgba(255,255,255,.76);
      font-size: 11px;
      line-height: 1.5;
    }

    .empty-state {
      border-color: var(--line);
      background: rgba(255,255,255,.035);
      color: var(--muted);
      text-align: center;
    }

    .error-box.visible,
    .empty-state.visible { display: block; }

    .footer {
      padding: 0 0 44px;
      color: rgba(247,247,242,.56);
      font-size: 12px;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 24px;
    }

    @media (max-width: 860px) {
      .toolbar,
      .version-head,
      .version-body { grid-template-columns: 1fr; }
      .version-actions { justify-content: flex-start; }
      .search { width: 100%; }
      .nav-inner { align-items: flex-start; flex-direction: column; }
      .nav-meta { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      :root { --side: 16px; }
      main { padding-top: 24px; }
      .page-head { text-align: left; margin-top: 22px; }
      .page-head p { margin: 0; }
      .version-card { border-radius: 22px; }
      .version-head, .version-body { padding: 14px; }
      .version-title { display: grid; }
      .btn { width: 100%; }
      .filters { display: grid; grid-template-columns: 1fr 1fr; }
      .filter-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container">
      <div class="nav-inner">
        <a class="brand" href="#top" aria-label="YOURDRUM beta downloads">
          <strong id="brandName">YOURDRUM™</strong>
          <span>Beta downloads</span>
        </a>
        <div class="nav-meta">
          <span class="tag orange" id="latestTag">Loading JSON</span>
          <span class="tag">Windows</span>
          <span class="tag">macOS</span>
        </div>
      </div>
    </div>
  </header>

  <main id="top">
    <div class="container">
      <section class="page-head" aria-labelledby="pageTitle">
        <h1 id="pageTitle">Beta <span class="accent">downloads.</span></h1>
        <p id="pageDescription">All beta versions are loaded from beta-downloads.json. Add a build in JSON, upload the file to the matching directory, and the download button updates automatically.</p>
      </section>

      <section class="toolbar" aria-label="Download controls">
        <div class="filters" id="filters">
          <button class="filter-btn active" type="button" data-platform="all">All</button>
          <button class="filter-btn" type="button" data-platform="windows">Windows</button>
          <button class="filter-btn" type="button" data-platform="macos">macOS</button>
          <button class="filter-btn" type="button" data-platform="latest">Latest</button>
        </div>
        <input class="search" id="searchInput" type="search" placeholder="Search version..." autocomplete="off" />
      </section>

      <section class="downloads" id="downloads" aria-live="polite"></section>
      <div class="empty-state" id="emptyState">No builds match this filter.</div>
      <div class="error-box" id="errorBox"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span>©2026 <span id="footerProduct">YOURDRUM™</span></span>
    
    </div>
  </footer>

  <script>
    const JSON_FILE = 'beta-downloads.json';
    const SUPPORTED_PLATFORMS = ['windows', 'macos'];

    const fallbackData = {
      product: 'YOURDRUM™',
      updated: '2026-06-15',
      description: 'Fallback data is visible because beta-downloads.json could not be loaded. Put the page on hosting or run a local server.',
      builds: [
        {
          platform: 'windows',
          version: '0.2.0-beta.2',
          directory: 'downloads/YOURDRUM-0.2.0-beta.2-windows.zip',
          date: '2026-06-15',
          latest: true,
          size: 'replace size',
          changes: [
            'Example Windows beta build.',
            'Replace this directory with your real Windows installer path.'
          ]
        },
        {
          platform: 'macos',
          version: '0.2.0-beta.2',
          directory: 'downloads/YOURDRUM-0.2.0-beta.2-macos.dmg',
          date: '2026-06-15',
          latest: true,
          size: 'replace size',
          changes: [
            'Example macOS beta build.',
            'Replace this directory with your real macOS installer path.'
          ]
        }
      ]
    };

    let allBuilds = [];
    let activePlatform = 'all';

    const downloadsRoot = document.getElementById('downloads');
    const emptyState = document.getElementById('emptyState');
    const errorBox = document.getElementById('errorBox');
    const searchInput = document.getElementById('searchInput');

    function cleanText(value, fallback = '') {
      return typeof value === 'string' && value.trim() ? value.trim() : fallback;
    }

    function normalizePlatform(value) {
      const platform = cleanText(value).toLowerCase().replace(/[^a-z0-9_-]/g, '');
      if (platform === 'mac' || platform === 'osx' || platform === 'darwin') return 'macos';
      return platform;
    }

    function formatPlatform(platform) {
      if (platform === 'windows') return 'Windows';
      if (platform === 'macos') return 'macOS';
      return platform || 'Unknown';
    }

    function platformShort(platform) {
      if (platform === 'windows') return 'W';
      if (platform === 'macos') return 'M';
      return '?';
    }

    function parseDate(value) {
      const time = Date.parse(value);
      return Number.isFinite(time) ? time : 0;
    }

    function sortBuilds(builds) {
      return [...builds].sort((a, b) => {
        if (Boolean(b.latest) !== Boolean(a.latest)) return Number(Boolean(b.latest)) - Number(Boolean(a.latest));
        const dateDiff = parseDate(b.date) - parseDate(a.date);
        if (dateDiff !== 0) return dateDiff;
        return cleanText(b.version).localeCompare(cleanText(a.version), undefined, { numeric: true, sensitivity: 'base' });
      });
    }

    function validBuilds(builds) {
      return Array.isArray(builds)
        ? builds
            .map((build) => ({ ...build, platform: normalizePlatform(build.platform) }))
            .filter((build) => SUPPORTED_PLATFORMS.includes(build.platform))
        : [];
    }

    function createChangesList(changes) {
      const list = document.createElement('ul');
      list.className = 'changes';
      const safeChanges = Array.isArray(changes) && changes.length ? changes : ['No changelog added for this build.'];

      safeChanges.forEach((change) => {
        const item = document.createElement('li');
        const text = document.createElement('span');
        text.textContent = cleanText(change, 'Update');
        item.appendChild(text);
        list.appendChild(item);
      });

      return list;
    }

    function createBuildCard(build) {
      const platform = normalizePlatform(build.platform);
      const version = cleanText(build.version, 'unknown-version');
      const directory = cleanText(build.directory, '#');
      const date = cleanText(build.date, 'no date');
      const size = cleanText(build.size, 'unknown size');
      const isLatest = build.latest === true;

      const card = document.createElement('article');
      card.className = 'version-card';
      card.dataset.platform = platform;
      card.dataset.version = version;
      card.dataset.latest = isLatest ? 'true' : 'false';

      const head = document.createElement('div');
      head.className = 'version-head';

      const titleWrap = document.createElement('div');
      titleWrap.className = 'version-title';

      const badge = document.createElement('div');
      badge.className = 'platform-badge';
      badge.textContent = platformShort(platform);

      const titleText = document.createElement('div');
      const title = document.createElement('h2');
      title.textContent = `${formatPlatform(platform)} ${version}`;

      const meta = document.createElement('div');
      meta.className = 'version-meta';
      meta.innerHTML = `<span>${date}</span><span>${size}</span>${isLatest ? '<span>Latest</span>' : ''}`;

      titleText.append(title, meta);
      titleWrap.append(badge, titleText);

      const actions = document.createElement('div');
      actions.className = 'version-actions';

      const download = document.createElement('a');
      download.className = 'btn';
      download.href = directory;
      download.setAttribute('download', '');
      download.textContent = `Download ${formatPlatform(platform)}`;

      actions.appendChild(download);
      head.append(titleWrap, actions);

      const body = document.createElement('div');
      body.className = 'version-body';

      const changes = createChangesList(build.changes);

      const fileBox = document.createElement('aside');
      fileBox.className = 'file-box';
      fileBox.innerHTML = `
        <span class="small">File directory</span>
        <span class="file-path"></span>
        <span class="small">Platform: ${formatPlatform(platform)}</span>
      `;
      fileBox.querySelector('.file-path').textContent = directory;

      body.append(changes, fileBox);
      card.append(head, body);
      return card;
    }

    function currentSearchQuery() {
      return cleanText(searchInput.value).toLowerCase();
    }

    function filteredBuilds() {
      const query = currentSearchQuery();
      return sortBuilds(allBuilds).filter((build) => {
        const platform = normalizePlatform(build.platform);
        const matchesPlatform =
          activePlatform === 'all' ||
          activePlatform === platform ||
          (activePlatform === 'latest' && build.latest === true);

        const haystack = [
          build.platform,
          build.version,
          build.date,
          build.directory,
          build.size,
          ...(Array.isArray(build.changes) ? build.changes : [])
        ].join(' ').toLowerCase();

        return matchesPlatform && (!query || haystack.includes(query));
      });
    }

    function renderBuilds() {
      const builds = filteredBuilds();
      downloadsRoot.innerHTML = '';
      builds.forEach((build) => downloadsRoot.appendChild(createBuildCard(build)));
      emptyState.classList.toggle('visible', builds.length === 0);
    }

    function renderPage(data, usedFallback = false) {
      const product = cleanText(data.product, 'YOURDRUM™');
      allBuilds = validBuilds(data.builds);

      document.title = `${product} - Beta Downloads`;
      document.getElementById('brandName').textContent = product;
      document.getElementById('footerProduct').textContent = product;
      document.getElementById('latestTag').textContent = usedFallback ? 'Fallback data' : `Updated ${cleanText(data.updated, 'unknown')}`;
      document.getElementById('pageDescription').textContent = cleanText(data.description, document.getElementById('pageDescription').textContent);

      renderBuilds();
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('visible');
    }

    async function loadDownloads() {
      try {
        const response = await fetch(JSON_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Cannot load ${JSON_FILE}`);
        const data = await response.json();
        renderPage(data, false);
      } catch (error) {
        renderPage(fallbackData, true);
        showError(`Could not load ${JSON_FILE}. If you opened index.html directly from disk, use hosting or run a local server. Showing fallback data now.`);
      }
    }

    document.querySelectorAll('.filter-btn').forEach((button) => {
      button.addEventListener('click', () => {
        activePlatform = button.dataset.platform;
        document.querySelectorAll('.filter-btn').forEach((item) => item.classList.toggle('active', item === button));
        renderBuilds();
      });
    });

    searchInput.addEventListener('input', renderBuilds);
    loadDownloads();
  </script>
</body>
</html>
